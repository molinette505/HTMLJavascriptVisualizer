</head>
<body>

    <div class="toolbar">
        <div class="toolbar-main">
            <div class="toolbar-group execution-controls">
                <!-- Icones Lucide mises à jour -->
                <button id="btn-toggle-run" class="icon-btn" onclick="app.toggleRun()" data-tooltip="play/stop" aria-label="play/stop"><i data-lucide="play"></i></button>
                <button id="btn-next" class="icon-btn" onclick="app.stepAnimated()" disabled data-tooltip="step" aria-label="step"><i data-lucide="step-forward"></i></button>
                <button id="btn-skip" class="icon-btn" onclick="app.stepInstant()" disabled data-tooltip="skip" aria-label="skip"><i data-lucide="skip-forward"></i></button>
            </div>
            <div class="toolbar-separator" aria-hidden="true"></div>
            <div class="toolbar-group event-controls">
                <button id="btn-load" class="icon-btn" onclick="app.toggleLoadPopup()" data-tooltip="load" aria-label="load"><i data-lucide="folder-open"></i></button>
                <button id="btn-breakpoints-toggle" class="icon-btn icon-btn-toggle" onclick="ui.toggleAllBreakpoints()" data-tooltip="toggle break points" aria-label="toggle break points" aria-pressed="false"><i data-lucide="octagon-pause"></i></button>
                <button id="btn-step-mode" class="icon-btn icon-btn-toggle is-on" onclick="ui.cycleStepMode()" data-tooltip="toggle step size" aria-pressed="true" aria-label="toggle step size"><i data-lucide="between-horizontal-start"></i></button>
                <button id="btn-options" class="icon-btn" onclick="event.stopPropagation(); ui.toggleOptionsPopup()" data-tooltip="settings" aria-label="settings"><i data-lucide="sliders-horizontal"></i></button>
            </div>
        </div>
        <div class="editor-mode-group" role="group" aria-label="Mode d'edition">
            <button id="btn-mode-html" class="mode-btn" onclick="app.setEditorMode('html')">HTML</button>
            <button id="btn-mode-css" class="mode-btn" onclick="app.setEditorMode('css')">CSS</button>
            <button id="btn-mode-js" class="mode-btn active" onclick="app.setEditorMode('js')">JS</button>
        </div>
        <div class="settings-group">
            <div class="control-group">
                <span>Vit.</span>
                <button class="speed-btn" onclick="ui.adjustSpeed(-1)">−</button>
                <div id="speed-display">1x</div>
                <button class="speed-btn" onclick="ui.adjustSpeed(1)">+</button>
            </div>
        </div>
        
        <div id="load-popup" class="event-popup load-popup">
            <span class="load-label">Scenarios (JS / HTML)</span>
            <select id="load-scenario-select"></select>
            <button onclick="app.loadSelectedScenario()">Load</button>
            <button class="btn-secondary" onclick="app.pickAndLoadHtmlFile()">Fichier HTML...</button>
            <button class="btn-secondary" onclick="app.toggleLoadPopup()">Fermer</button>
            <input id="load-html-file-input" type="file" accept=".html,.htm,text/html" hidden>
        </div>

        <div id="options-popup" class="event-popup options-popup">
            <span class="load-label">Parametres</span>
            <div class="options-section">
                <div class="options-section-title">Animation</div>
                <div id="option-row-flow-line" class="option-row">
                    <span>Visualisation lecture</span>
                    <button id="btn-toggle-read-visualization" class="toggle-btn is-on" onclick="ui.cycleReadVisualizationMode()">Liaison + donnees</button>
                </div>
            </div>
            <div class="options-section">
                <div class="options-section-title">Memoire</div>
                <div class="option-row">
                    <span>Types des variables</span>
                    <button id="btn-toggle-memory-types" class="toggle-btn" onclick="ui.toggleMemoryTypes()">OFF</button>
                </div>
                <div class="option-row">
                    <span>Adresses memoire</span>
                    <button id="btn-toggle-memory-addresses" class="toggle-btn" onclick="ui.toggleMemoryAddresses()">OFF</button>
                </div>
            </div>
            <div class="options-section">
                <div class="options-section-title">Mode p5.js</div>
                <div class="option-row">
                    <span>Activer p5.js</span>
                    <button id="btn-toggle-p5-mode" class="toggle-btn" onclick="app.toggleP5Mode()">OFF</button>
                </div>
                <div class="option-row option-row-input">
                    <span>Frequence draw (FPS)</span>
                    <input id="input-p5-frame-rate" type="number" min="1" step="1" value="12" onchange="app.setP5FrameRateFromInput(this.value)">
                </div>
            </div>
            <button class="btn-secondary" onclick="ui.toggleOptionsPopup(false)">Fermer</button>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-container" id="main-container">
        <div class="editor-container">
            <!-- Numéros de lignes (séparé du scroll wrapper) -->
            <div class="line-numbers" id="line-numbers">1</div>
            
            <!-- Zone scrollable -->
            <div class="code-wrapper" id="code-wrapper" onscroll="ui.syncScroll()">
                <div class="code-sizer">
                    <div id="highlight-layer" class="code-layer"></div>
                    <div id="code-display" class="code-layer"></div>
                    <!-- FIX 3: inputmode="text" and autocapitalize="off" to suppress helpers -->
                    <textarea id="code-input" class="code-layer" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off" inputmode="text" oninput="editor.handleInput()" onfocus="ui.showMobileTools()" onblur="ui.hideMobileTools()"></textarea>
                </div>
            </div>
            
            <!-- MOBILE TOOLBAR -->
            <div id="mobile-tools-container" class="mobile-tools-container">
                <div id="sub-toolbar" class="toolbar-row sub-toolbar hidden"></div>
                <div id="main-toolbar" class="toolbar-row main-toolbar">
                    <button class="tool-btn btn-text-sm" onmousedown="event.preventDefault()" onclick="editor.insertText('  ', false, true)">Tab</button>
                    <button class="tool-btn" onmousedown="event.preventDefault()" onclick="editor.insertText(' = ', false, true)">=</button>
                    <button class="tool-btn" onmousedown="event.preventDefault()" onclick="editor.insertText(';', false, true)">;</button>
                    <div class="tool-spacer"></div>
                    <button class="tool-btn" id="btn-cat-brackets" onmousedown="event.preventDefault()" onclick="ui.toggleSubTool('brackets', event)">
                        ( )<span class="tool-label">•</span>
                    </button>
                    <button class="tool-btn" id="btn-cat-math" onmousedown="event.preventDefault()" onclick="ui.toggleSubTool('math', event)">
                        +/-<span class="tool-label">•</span>
                    </button>
                    <button class="tool-btn" id="btn-cat-logic" onmousedown="event.preventDefault()" onclick="ui.toggleSubTool('logic', event)">
                        &lt;&gt;<span class="tool-label">•</span>
                    </button>
                    <div class="tool-spacer"></div>
                    <button class="tool-btn" onmousedown="event.preventDefault()" onclick="editor.undo(event)">↶</button>
                    <button class="tool-btn" onmousedown="event.preventDefault()" onclick="editor.redo(event)">↷</button>
                </div>
            </div>
        </div>
        <div id="desktop-splitter" class="desktop-splitter" aria-hidden="true"></div>

        <div class="right-panel" id="right-panel">
            <div class="drawer-handle-bar" id="drawer-handle">
                <div class="drawer-handle-icon"></div>
            </div>
            <div class="drawer-tabs">
                <div class="drawer-tab active" onclick="ui.switchTab('memory')" id="tab-memory">Mémoire</div>
                <div class="drawer-tab" onclick="ui.switchTab('console')" id="tab-console">Console</div>
                <div class="drawer-tab" onclick="ui.switchTab('dom')" id="tab-dom">DOM</div>
            </div>
            <div id="view-memory" class="drawer-content active">
                <div id="memory-container"></div>
                <div id="memory-render-panel"></div>
            </div>
            <div id="view-console" class="drawer-content">
                <div class="console-box" id="console-output"></div>
            </div>
            <div id="view-dom" class="drawer-content">
                <div class="dom-toolbar">
                    <button id="btn-toggle-dom-render" class="toggle-btn is-on" onclick="ui.toggleDomRender()">Rendu ON</button>
                </div>
                <div id="dom-view-tree" class="dom-view active"></div>
                <div id="dom-view-render" class="dom-view dom-view-render"></div>
            </div>
        </div>
    </div>
</body>
</html>
